# Fly.io config. Deploy with:  fly launch --copy-config --now   (uses the Dockerfile)
# Scales to zero when idle (min_machines_running = 0) so a low-traffic demo is ~free.
app = "cauala"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  CAUALA_MAX_CONCURRENCY = "4"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
